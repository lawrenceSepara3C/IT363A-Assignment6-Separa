{% extends 'albums/base.html' %}
{% block content %}
<h2>Delete Album</h2>
<p>Are you sure you want to delete the album: "<strong>{{ album.title }}</strong>"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" style="background:red; color:white; padding:10px;">Confirm Permanent Delete</button>
</form>
<br>
<a href="{% url 'album-detail' album.id %}">Cancel and Return</a>
{% endblock %}
