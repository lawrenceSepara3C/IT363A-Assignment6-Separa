{% extends 'albums/base.html' %}
{% block content %}
<h2>Upload New Photo</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload Image to Cloudinary</button>
</form>
<br>
<a href="{% url 'album-list' %}">Cancel</a>
{% endblock %}
